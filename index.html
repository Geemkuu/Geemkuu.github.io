<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totally Secure Login - Trust Us</title>
    <style>
        :root {
            --primary: #58cc02; /* Duolingo Green */
            --bg: #f0f0f0;
            --text: #3c3c3c;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            display: flex;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 900px;
            height: 550px;
            overflow: hidden;
        }

        /* --- LEFT SIDE: THE CHARACTERS --- */
        .visuals {
            flex: 1;
            background: #e5e5e5;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }

        .goof {
            position: relative;
            margin: 0 -10px;
            transition: transform 0.3s ease;
        }

        /* Character 1: Pink Blob (The Big One) */
        .pinky { width: 160px; height: 260px; background: #ff86d0; border-radius: 80px 80px 0 0; }
        /* Character 2: Blue Circle */
        .bluey { width: 100px; height: 100px; background: #1cb0f6; border-radius: 50%; bottom: 0; }
        /* Character 3: Teal Cloud */
        .tealy { width: 120px; height: 120px; background: #2beed3; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }

        .eye {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: height 0.2s; /* For blinking/closing */
        }

        .pupil {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
        }

        /* Specific Eye Placements */
        .pinky .eye { top: 60px; left: 60px; width: 45px; height: 45px; } 
        .bluey .eye.l { top: 25px; left: 20px; }
        .bluey .eye.r { top: 25px; right: 20px; }
        .tealy .eye.l { top: 30px; left: 25px; }
        .tealy .eye.r { top: 30px; right: 25px; }

        /* "Shy/Hidden" State when typing password */
        body.hiding-eyes .eye { height: 2px; overflow: hidden; }
        body.hiding-eyes .goof { transform: translateY(20px); }

        /* --- RIGHT SIDE: THE FORM --- */
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { font-size: 2rem; margin-bottom: 10px; color: var(--text); }
        p { color: #afafaf; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; position: relative; }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); }

        button.login-btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .stupid-icon {
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
        }

    </style>
</head>
<body>

<div class="login-container">
    <div class="visuals">
        <div class="goof tealy">
            <div class="eye l"><div class="pupil"></div></div>
            <div class="eye r"><div class="pupil"></div></div>
        </div>
        <div class="goof pinky">
            <div class="eye"><div class="pupil"></div></div>
        </div>
        <div class="goof bluey">
            <div class="eye l"><div class="pupil"></div></div>
            <div class="eye r"><div class="pupil"></div></div>
        </div>
    </div>

    <div class="form-side">
        <h2>Welcome back!</h2>
        <p>Please enter your details (we promise not to sell them to aliens).</p>
        
        <div class="input-group">
            <input type="text" placeholder="Your Name" id="nameInput">
            <span class="stupid-icon">📛</span>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Create Password" id="passInput">
            <span class="stupid-icon" id="toggleEye">👁️</span>
        </div>

        <button class="login-btn" onclick="celebrate()">Log In</button>
        
        <p style="text-align:center; font-size: 0.8rem; margin-top:20px;">
            Don't have an account? Too bad. <a href="#" style="color:#1877f2">Sign up</a>
        </p>
    </div>
</div>

<script>
    const pupils = document.querySelectorAll('.pupil');
    const passInput = document.getElementById('passInput');
    const toggleEye = document.getElementById('toggleEye');

    // 1. Mouse Tracking Logic
    document.addEventListener('mousemove', (e) => {
        if (document.body.classList.contains('hiding-eyes')) return;

        pupils.forEach(pupil => {
            const rect = pupil.getBoundingClientRect();
            const x = rect.left + (rect.width / 2);
            const y = rect.top + (rect.height / 2);
            const rad = Math.atan2(e.pageX - x, e.pageY - y);
            const rot = (rad * (180 / Math.PI) * -1) + 180;
            
            // Movement intensity
            const moveX = Math.sin(rad) * 6;
            const moveY = Math.cos(rad) * 6;
            
            pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    });

    // 2. The "Peeking" Logic (Behaviors from your image)
    passInput.addEventListener('focus', () => {
        document.body.classList.add('hiding-eyes');
    });

    passInput.addEventListener('blur', () => {
        document.body.classList.remove('hiding-eyes');
    });

    // 3. Password Toggle (The Eye Icon)
    toggleEye.addEventListener('click', () => {
        const isPass = passInput.type === "password";
        passInput.type = isPass ? "text" : "password";
        toggleEye.innerText = isPass ? "🙈" : "👁️";
    });

    function celebrate() {
        const name = document.getElementById('nameInput').value || "Stranger";
        alert(`Welcome, ${name}! Your password is safe with our pink blob friend.`);
    }
</script>

</body>
</html>
